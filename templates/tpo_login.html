<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TPO Login — CampusEdge</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="bg-glow"></div><div class="grid-lines"></div>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-icon" style="background:rgba(91,74,247,.15);border:.5px solid rgba(91,74,247,.25);">🎓</div>
    <div class="auth-title">TPO Login</div>
    <div class="auth-sub">Training & Placement Officer access</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}<ul class="flash-list">{% for cat,msg in messages %}<li class="flash-msg flash-{{cat}}">{{msg}}</li>{% endfor %}</ul>{% endif %}
    {% endwith %}

    <form method="POST">
      <div class="form-grid single">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" placeholder="tpo@university.edu" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="Enter your password" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Sign In to TPO Dashboard →</button>
    </form>
    <div class="auth-link">Don't have an account? <a href="/tpo/register">Register as TPO</a></div>
    <div class="auth-link"><a href="/">← Back to home</a></div>
  </div>
</div>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
