<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TPO Register — CampusEdge</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="bg-glow"></div><div class="grid-lines"></div>
<div class="auth-wrap">
  <div class="auth-card wide">
    <div class="auth-icon" style="background:rgba(91,74,247,.15);border:.5px solid rgba(91,74,247,.25);">🎓</div>
    <div class="auth-title">Register as TPO</div>
    <div class="auth-sub">Create your Training & Placement Officer account</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}<ul class="flash-list">{% for cat,msg in messages %}<li class="flash-msg flash-{{cat}}">{{msg}}</li>{% endfor %}</ul>{% endif %}
    {% endwith %}

    <form method="POST">
      <div class="form-grid">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="full_name" placeholder="Dr. Ravi Kumar" required>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" placeholder="tpo@university.edu" required>
        </div>
        <div class="form-group">
          <label>Employee ID</label>
          <input type="text" name="employee_id" placeholder="EMP-001" required>
        </div>
        <div class="form-group">
          <label>University / College Name</label>
          <input type="text" name="university" placeholder="VTU / MSRIT / BIT" required>
        </div>
        <div class="form-group">
          <label>Department</label>
          <input type="text" name="department" placeholder="Training & Placement Cell" required>
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" name="phone" placeholder="+91 9876543210" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="Create a strong password" required>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" name="confirm_password" placeholder="Repeat password" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Create TPO Account →</button>
    </form>
    <div class="auth-link">Already have an account? <a href="/tpo/login">Sign in</a></div>
    <div class="auth-link"><a href="/">← Back to home</a></div>
  </div>
</div>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
